name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: europe-west2
  ARTIFACT_REPO: prototypes

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Compute service name
        id: svc
        run: |
          NAME="${GITHUB_REPOSITORY#*/}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Deploying as: $NAME"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        id: build
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ steps.svc.outputs.name }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ steps.svc.outputs.name }} \
            --image="${{ steps.build.outputs.image }}" \
            --region="${{ env.REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --set-env-vars="PROTO_NAME=${{ steps.svc.outputs.name }}"

      - name: Show URL
        run: |
          URL=$(gcloud run services describe ${{ steps.svc.outputs.name }} \
            --region="${{ env.REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format='value(status.url)')
          echo "::notice title=Live URL::$URL"
